services:
  bot:
    extends:
      file: docker-compose.yml
      service: test_bot
    image: bot
    container_name: bot
    # MariaDB on the deployment host only listens on 127.0.0.1.
    network_mode: host

    environment:
      - DEBUG=False
      - MYSQL_HOST=127.0.0.1
    restart: on-failure:10
